<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Jenny's BG Dashboard</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="dateNavigation.css" />
        <link rel="icon" type="image/png" href="favicon.png">
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

        <script src="chartConfig.js"></script>
        
        
    </head>
    <body>
        <h1 id="dateHeading" style="text-align: center; font-size: 1.8rem; margin-top: 2rem;"></h1>
        
        <div id="dateNavContainer">
            <button id="prevDate">⬅️ Previous</button>
            <input type="date" id="selectedDate" />
            <button id="nextDate">➡️ Next</button>
        </div>
        
        <div>
            
            <div id="summaryRow" class="summary-row"></div>
            
            <div class="jump-container">
                <div class="jump-inner">
                    <label for="jumpInput">
                      Jump to time:
                      <span class="help-tip" data-tip="Type a time like '2pm' or '2:45pm' and press Enter to jump to that time in the chart.">?</span>
                    </label>
                
                    <input type="text" id="jumpInput" placeholder="e.g. 2:30pm then Enter" />
                </div>
            </div>
            
            <div id="bgChartContainer" class="chartContainer">
                <canvas id="bgChart"></canvas>
            </div>

            <div id="bolusChartContainer" class="chartContainer">
                <canvas id="bolusChart"></canvas>
            </div>
            
            <div id="workoutChartContainer" class="chartContainer">
                <canvas id="workoutChart"></canvas>
            </div>
            
            <div id="basalChartContainer" class="chartContainer">
                <canvas id="basalChart"></canvas>
            </div>
            
            <div id="foodChartContainer" class="chartContainer">
              <canvas id="foodChart"></canvas>
            </div>
            
            
            <div style="text-align: center; margin-top: 1rem; margin-bottom: 0.5rem;">
              <span class="help-tip" data-tip="You can click on a note, a food, a bolus or a workout to navigate to that time in the chart. Clicking on a note in the 'all notes' tab navigates to the date of the note too.">?</span>
            </div>
            
            <div id="dailyTabs" class="tab-section">
              <div class="tab-bar">
                <button class="tab-button active" data-tab="notes">📝 Notes</button>
                <button class="tab-button" data-tab="foodLogs">🥗 Food</button>
                <button class="tab-button" data-tab="bolus">💉 Bolus</button>
                <button class="tab-button" data-tab="fasts">⏳ Fasts</button>
                <button class="tab-button" data-tab="workouts">🏃‍♀️ Workouts</button>
                <button class="tab-button" data-tab="all-notes">🔍 All Notes</button>
              </div>

              <div id="notesContainer" class="tab-content active-tab daily-section"></div>
              <div id="foodLogsContainer" class="tab-content daily-section"></div>
              <div id="bolusContainer" class="tab-content daily-section"></div>
              <div id="fastsContainer" class="tab-content daily-section"></div>
              <div id="workoutsContainer" class="tab-content daily-section"></div>
              <div id="all-notes" class="tab-content daily-section"></div>
            </div>

        </div>
        
        
        <script src="createCharts.js"></script>
        <script src="helpers.js"></script>
        <script src="dynamicLine.js"></script>
        <script src="annotationZones.js"></script>
        <script src="chartPlugins.js"></script>
        <script src="eventListeners.js"></script>
        <script src="getPoints.js"></script>
        <script src="showForDate.js"></script>
        <script src="chartData.js"></script>
        <script src="stats.js"></script>
        <script src="chartLogic.js"></script>
        <script src="dateNavigation.js"></script>
    </body>
